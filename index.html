<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>我的可愛小天地</title>
  <style>
    body {
      margin: 0;
      font-family: "Comic Sans MS", "Arial";
      background: linear-gradient(to bottom, #ffe4ec, #fff0f5);
      color: #ff6f91;
      text-align: center;
    }

    .card {
      background: white;
      width: 300px;
      margin: 50px auto;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(255, 182, 193, 0.5);
    }

    img {
      width: 120px;
      border-radius: 50%;
      border: 4px solid #ffd1dc;
    }

    h1 {
      margin: 10px 0;
    }

    p {
      font-size: 14px;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #ffb6c1;
      color: white;
      border-radius: 20px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff6f91;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="https://i.imgur.com/6VBx3io.png" alt="avatar">
    <h1>鍾雁淳 ♡</h1>
    <p>嗨嗨～我是個喜歡可愛事物的小夥伴 ✨<br>
    喜歡打遊戲、寫程式、還有養電子雞 🐔💖</p>

    <p>🎀 興趣：畫畫 / coding / 睡覺<br>
       🍓 喜歡：粉紅色 / 甜點 / 小動物</p>

    <a href="#" class="btn">聯絡我 💌</a>
  </div>

</body>
</html>
